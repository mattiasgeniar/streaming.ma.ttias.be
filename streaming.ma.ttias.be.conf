streaming.ma.ttias.be {
    encode zstd gzip

    log {
        output file /var/www/html/streaming.ma.ttias.be/logs/access.log
    }

    header {
        Strict-Transport-Security "max-age=31536000"
        X-Content-Type-Options "nosniff"
        X-Frame-Options "DENY"
        Referrer-Policy "no-referrer"
        Permissions-Policy "geolocation=(), microphone=(), camera=()"
        -Server
    }

    # Serve static files directly from disk (bypasses Uvicorn)
    # Root is the static/ dir itself — cannot escape to .env, backend.py, etc.
    handle /static/images/* {
        uri strip_prefix /static
        root * /var/www/html/streaming.ma.ttias.be/public/static
        file_server
        header Cache-Control "public, max-age=604800, immutable"
    }
    handle /static/* {
        uri strip_prefix /static
        root * /var/www/html/streaming.ma.ttias.be/public/static
        file_server
        header Cache-Control "public, max-age=86400"
    }

    # Serve robots.txt and sitemap.xml directly from disk
    handle /robots.txt {
        root * /var/www/html/streaming.ma.ttias.be/public/static
        file_server
    }
    handle /sitemap.xml {
        root * /var/www/html/streaming.ma.ttias.be/public/static
        file_server
    }

    # Cache title list briefly (changes at most once per day)
    @api_titles path /api/titles
    header @api_titles Cache-Control "public, max-age=300"

    # Everything else (/, /api/*) goes to Uvicorn
    reverse_proxy localhost:8000
}
